<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0d14" />
<title>FOCUS.exe — 춘천고 3학년 집중 큐레이션</title>
<meta name="description" content="유튜브 알고리즘에서 벗어나, 필요한 영상만. 춘천고 고3 전용 학습/멘탈 큐레이션." />

<!-- 한글 본문용: Pretendard / 디스플레이용: JetBrains Mono -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />

<style>
/* =========================================================
   DESIGN TOKENS
   ========================================================= */
:root {
  /* surface */
  --bg-0: #0a0d14;
  --bg-1: #0f131c;
  --bg-2: #161a26;
  --bg-3: #1d2230;
  --line: rgba(255, 255, 255, 0.06);
  --line-strong: rgba(255, 255, 255, 0.12);

  /* text */
  --text-0: #e7eaf2;
  --text-1: #a8aec0;
  --text-2: #6c7283;

  /* accent */
  --neon-green: #39ff9d;
  --neon-green-dim: rgba(57, 255, 157, 0.18);
  --neon-purple: #b794f6;
  --neon-purple-dim: rgba(183, 148, 246, 0.18);
  --warn: #ffd166;

  /* shadow / glow */
  --glow-green: 0 0 0 1px rgba(57, 255, 157, 0.35), 0 8px 28px rgba(57, 255, 157, 0.18);
  --glow-purple: 0 0 0 1px rgba(183, 148, 246, 0.35), 0 8px 28px rgba(183, 148, 246, 0.18);

  /* type */
  --font-sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* radius */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
}

/* =========================================================
   RESET
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  min-height: 100vh;
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--font-sans);
  font-weight: 500;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;

  /* 백그라운드 텍스처: 미세 그리드 + 라디얼 글로우 (Discord/IDE 느낌) */
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(183, 148, 246, 0.10), transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 100%, rgba(57, 255, 157, 0.06), transparent 60%),
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: auto, auto, 32px 32px, 32px 32px;
  background-position: center top, left bottom, center, center;
  background-attachment: fixed;
}

button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* =========================================================
   LAYOUT
   ========================================================= */
.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 18px 80px;
}

/* =========================================================
   HEADER · D-DAY HUD
   ========================================================= */
.hud {
  position: relative;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) ,
    var(--bg-1);
  padding: 18px 18px 20px;
  overflow: hidden;
  margin-bottom: 22px;
}
.hud::before {
  /* 좌상단 코너 데코 */
  content: "";
  position: absolute; top: 0; left: 0;
  width: 80px; height: 80px;
  border-top: 1px solid var(--neon-green);
  border-left: 1px solid var(--neon-green);
  border-top-left-radius: var(--r-lg);
  opacity: 0.7;
  pointer-events: none;
}
.hud::after {
  /* 우하단 코너 데코 */
  content: "";
  position: absolute; right: 0; bottom: 0;
  width: 80px; height: 80px;
  border-bottom: 1px solid var(--neon-purple);
  border-right: 1px solid var(--neon-purple);
  border-bottom-right-radius: var(--r-lg);
  opacity: 0.7;
  pointer-events: none;
}

.hud__topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-2);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.hud__brand {
  display: flex; align-items: center; gap: 8px;
}
.hud__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--neon-green);
  box-shadow: 0 0 12px var(--neon-green);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
.hud__brand-name { color: var(--text-1); font-weight: 700; }
.hud__status { color: var(--neon-green); }

.hud__main {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}
.hud__label {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--text-2);
  text-transform: uppercase;
}
.hud__label .underline {
  color: var(--neon-purple);
}
.hud__dday {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
}
.hud__dday-prefix {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: clamp(28px, 9vw, 44px);
  color: var(--text-1);
  letter-spacing: -0.02em;
}
.hud__dday-num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: clamp(48px, 14vw, 88px);
  line-height: 1;
  color: var(--neon-green);
  letter-spacing: -0.04em;
  text-shadow: 0 0 24px rgba(57, 255, 157, 0.5);
  animation: glowPulse 1.8s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { text-shadow: 0 0 24px rgba(57, 255, 157, 0.50); }
  50%      { text-shadow: 0 0 36px rgba(57, 255, 157, 0.85); }
}
.hud__dday-suffix {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: clamp(14px, 4vw, 18px);
  color: var(--text-2);
}
.hud__date {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-2);
  margin-top: 4px;
}

/* =========================================================
   INTRO COPY
   ========================================================= */
.intro {
  margin: 24px 4px 18px;
}
.intro__kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--neon-purple);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.intro__kicker::before {
  content: "";
  width: 18px; height: 1px; background: var(--neon-purple);
}
.intro__title {
  margin: 0 0 6px;
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-0);
}
.intro__title em {
  font-style: normal;
  color: var(--neon-green);
}
.intro__sub {
  margin: 0;
  font-size: 14px;
  color: var(--text-1);
  font-weight: 500;
}

/* =========================================================
   FILTER BAR
   ========================================================= */
.filters {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 18px 0 22px;
  padding: 8px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
}
.chip {
  appearance: none;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-1);
  padding: 14px 8px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  transition: all 0.18s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
}
.chip__emoji { font-size: 20px; line-height: 1; }
.chip__label { font-size: 13px; }
.chip__mono {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.06em;
}
.chip:hover:not(.is-active) {
  background: var(--bg-2);
  color: var(--text-0);
}
.chip.is-active {
  background: var(--bg-2);
  color: var(--text-0);
  border-color: var(--neon-green);
  box-shadow: var(--glow-green);
}
.chip.is-active .chip__mono { color: var(--neon-green); }

/* =========================================================
   STATUS BAR (API key warning, loading, error)
   ========================================================= */
.statusbar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin-bottom: 16px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line-strong);
  background: var(--bg-1);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--warn);
}
.statusbar.is-visible { display: flex; }
.statusbar__icon {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--warn);
  box-shadow: 0 0 10px var(--warn);
  flex-shrink: 0;
}
.statusbar__msg { color: var(--text-1); line-height: 1.45; }

/* =========================================================
   VIDEO GRID
   ========================================================= */
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-2);
  text-transform: uppercase;
}
.section-title::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--line-strong), transparent);
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  opacity: 0;
  transform: translateY(8px);
  animation: cardIn 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
}
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}
.card:hover {
  border-color: var(--neon-green);
  box-shadow: var(--glow-green);
  transform: translateY(-2px);
}
.card:hover .card__thumb img,
.card:hover .card__thumb .placeholder-thumb {
  transform: scale(1.04);
}

.card__thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--bg-3);
  overflow: hidden;
}
.card__thumb img,
.card__thumb .placeholder-thumb {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.45s ease;
}
.card__badge {
  position: absolute;
  bottom: 8px; right: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: rgba(10, 13, 20, 0.85);
  color: var(--neon-green);
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--neon-green-dim);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.card__body {
  padding: 14px 14px 16px;
}
.card__title {
  margin: 0 0 8px;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--text-0);
  letter-spacing: -0.01em;
  /* 2줄 클램프 */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card__meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  color: var(--text-2);
}
.card__channel {
  font-family: var(--font-mono);
  color: var(--text-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card__arrow {
  color: var(--neon-green);
  font-family: var(--font-mono);
  font-weight: 700;
  flex-shrink: 0;
}

/* 스켈레톤 카드 */
.card--skeleton {
  pointer-events: none;
  opacity: 1;
  transform: none;
  animation: none;
}
.skeleton-block {
  background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.2s linear infinite;
  border-radius: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.card--skeleton .card__thumb { background: var(--bg-2); }
.card--skeleton .card__thumb .skeleton-block { width: 100%; height: 100%; border-radius: 0; }
.card--skeleton .card__body { padding: 14px; }
.card--skeleton .skel-title { height: 16px; width: 90%; margin-bottom: 8px; }
.card--skeleton .skel-title.short { width: 60%; }
.card--skeleton .skel-meta { height: 12px; width: 40%; margin-top: 12px; }

/* 빈 상태 */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-2);
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.04em;
}

/* =========================================================
   FOOTER
   ========================================================= */
.foot {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px dashed var(--line-strong);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.06em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.foot__l { color: var(--text-1); }
.foot__r .green { color: var(--neon-green); }

/* =========================================================
   RESPONSIVE — 태블릿/데스크탑 대응
   ========================================================= */

/* 태블릿 세로 (iPad mini ~ iPad 세로) */
@media (min-width: 601px) {
  .wrap { padding: 28px 28px 100px; }
  .hud { padding: 22px 24px 24px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .hud__main {
    grid-template-columns: 1fr auto;
    align-items: end;
  }
  .hud__date { text-align: right; margin-top: 0; }
}

/* 태블릿 가로 / 데스크탑 */
@media (min-width: 901px) {
  .wrap { padding: 36px 36px 120px; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .filters {
    /* 태블릿 가로에서는 칩이 무식하게 늘어나지 않도록 폭 제한 + 중앙 정렬 */
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .chip { padding: 16px 12px; }
  .card__title { font-size: 16px; }
}

/* 매우 좁은 화면 (구형 안드로이드 등) */
@media (max-width: 360px) {
  .chip__label { font-size: 12px; }
  .chip__emoji { font-size: 18px; }
  .filters { gap: 6px; padding: 6px; }
}

/* 접근성: 모션 감소 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}
</style>
</head>

</main>

/* ---------- 2. DOM 캐싱 ---------- */
const $grid = document.getElementById("grid");
const $sectionTitle = document.getElementById("sectionTitle");
const $statusbar = document.getElementById("statusbar");
const $statusMsg = document.getElementById("statusMsg");
const $ddayNum = document.getElementById("ddayNum");
const $targetDate = document.getElementById("targetDate");
const $chips = document.querySelectorAll(".chip");

/* ---------- 3. D-DAY 계산 ---------- */
function updateDDay() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(EXAM_DATE);
  target.setHours(0, 0, 0, 0);

  const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  if (diff > 0) {
    $ddayNum.textContent = diff;
  } else if (diff === 0) {
    $ddayNum.textContent = "DAY";
  } else {
    $ddayNum.textContent = "수능종료";
  }

  // 요일 표시
  const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
  const wd = weekdays[target.getDay()];
  const y = target.getFullYear();
  const m = String(target.getMonth() + 1).padStart(2, "0");
  const d = String(target.getDate()).padStart(2, "0");
  $targetDate.textContent = `target: ${y}.${m}.${d} (${wd})`;
}

/* ---------- 4. STATUS BAR ---------- */
function showStatus(msg) {
  $statusMsg.textContent = msg;
  $statusbar.classList.add("is-visible");
}
function hideStatus() {
  $statusbar.classList.remove("is-visible");
}

/* ---------- 5. MOCK 썸네일 (SVG data URI) ---------- */
// 외부 이미지 의존성 없이 카테고리별로 그라데이션 + 패턴 썸네일을 생성.
function makeMockThumb(category, seed) {
  const palettes = {
    math:    ["#0f131c", "#1d2230", "#39ff9d"],
    english: ["#0f131c", "#1d2230", "#b794f6"],
    mental:  ["#0f131c", "#241a2e", "#ff6b8a"],
  };
  const [c1, c2, accent] = palettes[category] || palettes.math;
  const offset = (seed * 37) % 100;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="g${seed}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${c1}"/>
          <stop offset="100%" stop-color="${c2}"/>
        </linearGradient>
        <pattern id="p${seed}" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
          <path d="M 24 0 L 0 0 0 24" fill="none" stroke="${accent}" stroke-opacity="0.08" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="480" height="270" fill="url(#g${seed})"/>
      <rect width="480" height="270" fill="url(#p${seed})"/>
      <circle cx="${80 + offset * 3}" cy="${60 + offset}" r="120" fill="${accent}" fill-opacity="0.08"/>
      <circle cx="${420 - offset * 2}" cy="${210}" r="80" fill="${accent}" fill-opacity="0.10"/>
      <text x="32" y="200" font-family="JetBrains Mono, monospace" font-size="28" font-weight="800" fill="${accent}" opacity="0.85">
        ${(category || "").toUpperCase()}
      </text>
      <text x="32" y="226" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#a8aec0" letter-spacing="2">
        // queue · #${String(seed).padStart(3, "0")}
      </text>
    </svg>
  `.trim();
  return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
}

/* ---------- 6. CARD RENDERING ---------- */
function renderCards(items, category) {
  $grid.innerHTML = "";
  if (!items || items.length === 0) {
    $grid.innerHTML = `<div class="empty">// 표시할 영상이 없습니다.</div>`;
    return;
  }
  const badge = CATEGORIES[category]?.badge || "VIDEO";

  items.forEach((item, idx) => {
    const isReal = !!item.videoId;
    const href = isReal
      ? `https://www.youtube.com/watch?v=${item.videoId}`
      : "#";

    // 썸네일: 실제 API → YouTube 썸네일, mock → SVG
    const thumbEl = isReal && item.thumbnail
      ? `<img src="${item.thumbnail}" alt="" loading="lazy" referrerpolicy="no-referrer">`
      : `<img class="placeholder-thumb" src="${makeMockThumb(category, item.mockSeed || idx + 1)}" alt="">`;

    const a = document.createElement("a");
    a.className = "card";
    a.href = href;
    if (isReal) {
      a.target = "_blank";
      a.rel = "noopener noreferrer";
    } else {
      a.addEventListener("click", (e) => {
        e.preventDefault();
        showStatus("이건 미리보기용 mock 카드예요. 실제 영상은 API 키 입력 후에 연결됩니다.");
      });
    }
    a.style.animationDelay = `${idx * 60}ms`;

    a.innerHTML = `
      <div class="card__thumb">
        ${thumbEl}
        <span class="card__badge">${badge}</span>
      </div>
      <div class="card__body">
        <h3 class="card__title">${escapeHtml(item.title)}</h3>
        <div class="card__meta">
          <span class="card__channel">${escapeHtml(item.channel || "youtube")}</span>
          <span class="card__arrow">→</span>
        </div>
      </div>
    `;
    $grid.appendChild(a);
  });
}

function renderSkeletons(n = 6) {
  $grid.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const div = document.createElement("div");
    div.className = "card card--skeleton";
    div.innerHTML = `
      <div class="card__thumb"><div class="skeleton-block"></div></div>
      <div class="card__body">
        <div class="skeleton-block skel-title"></div>
        <div class="skeleton-block skel-title short"></div>
        <div class="skeleton-block skel-meta"></div>
      </div>
    `;
    $grid.appendChild(div);
  }
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* ---------- 7. YOUTUBE DATA API v3 ---------- */
async function fetchYouTube(category) {
  const cfg = CATEGORIES[category];
  if (!cfg) throw new Error("unknown category");

  // API 키 미입력 → 바로 mock 모드
  if (!YT_API_KEY || YT_API_KEY === "YOUR_YOUTUBE_API_KEY") {
    throw new Error("NO_API_KEY");
  }

  const params = new URLSearchParams({
    part: "snippet",
    q: cfg.query,
    type: "video",
    maxResults: "9",
    order: "relevance",
    regionCode: "KR",
    relevanceLanguage: "ko",
    safeSearch: "strict",
    key: YT_API_KEY,
  });

  const res = await fetch(`${YT_ENDPOINT}?${params.toString()}`);
  if (!res.ok) throw new Error(`API_ERROR_${res.status}`);

  const data = await res.json();
  if (!data.items || data.items.length === 0) throw new Error("EMPTY_RESULT");

  return data.items.map((it) => ({
    title: it.snippet.title,
    channel: it.snippet.channelTitle,
    videoId: it.id.videoId,
    thumbnail: it.snippet.thumbnails?.medium?.url || it.snippet.thumbnails?.default?.url,
  }));
}

/* ---------- 8. MAIN LOAD ---------- */
async function loadCategory(category) {
  const cfg = CATEGORIES[category];
  $sectionTitle.textContent = `// ${cfg.label}`;
  renderSkeletons(6);

  try {
    const videos = await fetchYouTube(category);
    hideStatus();
    renderCards(videos, category);
  } catch (err) {
    // 어떤 에러든 mock으로 graceful fallback
    if (err.message === "NO_API_KEY") {
      showStatus(`API 키 미설정 — 미리보기(mock) 모드로 표시 중. index.html의 YT_API_KEY를 채우면 실제 영상이 로드됩니다.`);
    } else {
      showStatus(`YouTube API 호출 실패 (${err.message}) — mock 데이터로 표시합니다.`);
    }
    renderCards(cfg.mock, category);
  }
}

/* ---------- 9. EVENT BINDINGS ---------- */
$chips.forEach((chip) => {
  chip.addEventListener("click", () => {
    $chips.forEach((c) => c.classList.remove("is-active"));
    chip.classList.add("is-active");
    const cat = chip.dataset.category;
    loadCategory(cat);
    // 부드러운 스크롤 (모바일에서 카드 보이게)
    setTimeout(() => {
      $sectionTitle.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 100);
  });
});

/* ---------- 10. BOOT ---------- */
updateDDay();
// 자정 갱신: 매 분 D-Day 재계산 (페이지를 켜둔 채로 자정을 넘어가도 정확하게)
setInterval(updateDDay, 60 * 1000);

// 첫 로드: 수학
loadCategory("math");
</script>
